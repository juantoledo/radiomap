name: Bump version and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && !contains(github.event.head_commit.message, 'chore(release):') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(grep "const VERSION" data.js | sed "s/.*'\([^']*\)'.*/\1/")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

          BUMP_LEVEL="patch"
          for msg in $(echo '${{ toJSON(github.event.commits) }}' | jq -r '.[].message'); do
            if echo "$msg" | grep -qE '^[a-zA-Z]+!|BREAKING CHANGE'; then
              BUMP_LEVEL="major"
              break
            fi
            if echo "$msg" | grep -qE '^feat(\([^)]+\))?:'; then
              BUMP_LEVEL="minor"
            fi
          done
          echo "level=$BUMP_LEVEL" >> $GITHUB_OUTPUT

          IFS='.' read -r MAJ MIN PATCH <<< "$CURRENT"
          case "$BUMP_LEVEL" in
            major) MAJ=$((MAJ+1)); MIN=0; PATCH=0 ;;
            minor) MIN=$((MIN+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW_VERSION="${MAJ}.${MIN}.${PATCH}"
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT

          sed -i "s/const VERSION = '[^']*'/const VERSION = '$NEW_VERSION'/" data.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --staged --quiet || git commit -m "chore(release): bump version to ${{ steps.bump.outputs.new }}"
          git push

  deploy:
    needs: bump
    if: ${{ always() && (needs.bump.result == 'success' || needs.bump.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
