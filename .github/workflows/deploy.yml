name: Bump version and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && !contains(github.event.head_commit.message, 'chore(release):') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build data.js from CSV
        run: python scripts/csv-to-datajs.py

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(grep "const VERSION" data/data.js | sed "s/.*'\([^']*\)'.*/\1/")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

          BUMP_LEVEL="patch"
          for msg in $(echo '${{ toJSON(github.event.commits) }}' | jq -r '.[].message'); do
            if echo "$msg" | grep -qE '^[a-zA-Z]+!|BREAKING CHANGE'; then
              BUMP_LEVEL="major"
              break
            fi
            if echo "$msg" | grep -qE '^feat(\([^)]+\))?:'; then
              BUMP_LEVEL="minor"
            fi
          done
          echo "level=$BUMP_LEVEL" >> $GITHUB_OUTPUT

          IFS='.' read -r MAJ MIN PATCH <<< "$CURRENT"
          case "$BUMP_LEVEL" in
            major) MAJ=$((MAJ+1)); MIN=0; PATCH=0 ;;
            minor) MIN=$((MIN+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW_VERSION="${MAJ}.${MIN}.${PATCH}"
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT

          sed -i "s/const VERSION = '[^']*'/const VERSION = '$NEW_VERSION'/" data/data.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.js
          git diff --staged --quiet || git commit -m "chore(release): bump version to ${{ steps.bump.outputs.new }}"
          git push

      - name: Create and push tag
        run: |
          git tag "v${{ steps.bump.outputs.new }}"
          git push origin "v${{ steps.bump.outputs.new }}"

  deploy:
    needs: bump
    if: ${{ always() && (needs.bump.result == 'success' || needs.bump.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build data.js from CSV
        run: python scripts/csv-to-datajs.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Minify JavaScript
        run: |
          set -e
          TERSER_VERSION=5.37.0
          minify_one() {
            npx --yes "terser@${TERSER_VERSION}" "$1" \
              -c passes=2 \
              --no-mangle \
              --format comments=false \
              -o "$1.tmp" && mv "$1.tmp" "$1"
          }
          for f in \
            scripts/theme.js \
            scripts/location-filter.js \
            scripts/share-view.js \
            scripts/export-csv.js \
            scripts/help.js \
            scripts/map.js \
            scripts/list.js \
            data/data.js; do
            minify_one "$f"
          done

      - name: Inject cache-busting version into HTML
        run: |
          python3 << 'PY'
          import re
          from pathlib import Path
          text = Path("data/data.js").read_text(encoding="utf-8")
          m = re.search(r"const\s+VERSION\s*=\s*['\"]([^'\"]+)['\"]", text)
          if not m:
              raise SystemExit("VERSION not found in data/data.js")
          ver = m.group(1)
          for name in ("index.html", "lista.html"):
              p = Path(name)
              p.write_text(p.read_text(encoding="utf-8").replace("__VERSION__", ver), encoding="utf-8")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
